<script>
fetch("https://opensheet.elk.sh/1EN2O0crl9IiY86P0XKv5GPs8OWL54kP0QrYDUvLqGYQ/Tour_data")
  .then(res => res.json())
  .then(data => {
    const container = document.getElementById('tour-list');

        // 👉 Hvis der ikke er nogen shows
    if (data.length === 0) {
      container.innerHTML = "<p>No upcoming dates.</p>";
      return;
    }

    data.forEach(show => {
      const div = document.createElement('div');
      div.classList.add('tour-item');

      div.innerHTML = `
        <span>${show.Date}</span>
        <span>${show.City}</span>
        <span>${show.Venue}</span>
        <a href="${show.Ticket}" target="_blank">tickets</a>
      `;

      container.appendChild(div);
    });
  });
</script>




<script>
const elements = document.querySelectorAll('.section');

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if (entry.isIntersecting) {
      entry.target.classList.add('visible');
    } else {
      entry.target.classList.remove('visible');
    }
  });
}, {
  threshold: 0.2
});

elements.forEach(el => {
  el.classList.add('fade-in');
  observer.observe(el);
});
</script>
